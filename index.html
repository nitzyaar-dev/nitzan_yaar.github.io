<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartInvest AI</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0A0A0B;
            color: #F0F0F0;
            margin: 0;
        }
        .glass {
            background: rgba(25, 25, 28, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .btn-primary {
            background-color: #10b981;
            color: #000;
            font-weight: 800;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #34d399;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- הודעת טעינה למקרה שה-JS נכשל -->
    <div id="root">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; color: #10b981; font-family: sans-serif;">
            טוען מערכת השקעות...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // נתונים בסיסיים
        const STOCKS = [
            { ticker: 'NVDA', name: 'NVIDIA', price: 875, return: 45, risk: 'High' },
            { ticker: 'AAPL', name: 'Apple', price: 172, return: 15, risk: 'Low' },
            { ticker: 'MSFT', name: 'Microsoft', price: 415, return: 18, risk: 'Low' },
            { ticker: 'TSLA', name: 'Tesla', price: 163, return: 35, risk: 'High' },
            { ticker: 'AMZN', name: 'Amazon', price: 178, return: 20, risk: 'Medium' },
            { ticker: 'GOOGL', name: 'Google', price: 151, return: 22, risk: 'Medium' }
        ];

        function App() {
            const [minPrice, setMinPrice] = useState(0);
            const [maxPrice, setMaxPrice] = useState(1000);
            const [risk, setRisk] = useState('Medium');
            const [horizon, setHorizon] = useState('Medium');
            const [filtered, setFiltered] = useState(STOCKS);

            // פונקציית סינון
            const filterData = () => {
                const results = STOCKS.filter(s => {
                    const priceMatch = s.price >= minPrice && s.price <= maxPrice;
                    const riskMatch = risk === 'All' || s.risk === risk;
                    return priceMatch && riskMatch;
                });
                setFiltered(results);
            };

            // הפעלת אייקונים אחרי שהדף נטען
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
                filterData();
            }, [minPrice, maxPrice, risk]);

            return (
                <div className="min-h-screen p-6 max-w-5xl mx-auto">
                    {/* Header */}
                    <header className="flex items-center gap-4 mb-10">
                        <div className="bg-emerald-500 p-3 rounded-xl">
                            <i data-lucide="trending-up" className="text-black"></i>
                        </div>
                        <h1 className="text-3xl font-black tracking-tight">SmartInvest <span className="text-emerald-500">AI</span></h1>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Sidebar */}
                        <div className="glass p-6 rounded-3xl h-fit space-y-6">
                            <h2 className="font-bold flex items-center gap-2">
                                <i data-lucide="filter" className="w-4 h-4 text-emerald-500"></i> פילטרים
                            </h2>
                            
                            <div className="space-y-2">
                                <label className="text-xs opacity-50 uppercase">טווח מחיר ($)</label>
                                <div className="flex gap-2">
                                    <input type="number" value={minPrice} onChange={e => setMinPrice(e.target.value)} className="w-full bg-black/50 border border-white/10 p-2 rounded-lg text-sm" placeholder="מ-" />
                                    <input type="number" value={maxPrice} onChange={e => setMaxPrice(e.target.value)} className="w-full bg-black/50 border border-white/10 p-2 rounded-lg text-sm" placeholder="עד" />
                                </div>
                            </div>

                            <div className="space-y-2">
                                <label className="text-xs opacity-50 uppercase">רמת סיכון</label>
                                <select value={risk} onChange={e => setRisk(e.target.value)} className="w-full bg-black/50 border border-white/10 p-2 rounded-lg text-sm">
                                    <option value="Low">נמוך (סולידי)</option>
                                    <option value="Medium">בינוני (מאוזן)</option>
                                    <option value="High">גבוה (אגרסיבי)</option>
                                </select>
                            </div>

                            <div className="space-y-2">
                                <label className="text-xs opacity-50 uppercase">אופק השקעה</label>
                                <select value={horizon} onChange={e => setHorizon(e.target.value)} className="w-full bg-black/50 border border-white/10 p-2 rounded-lg text-sm">
                                    <option value="Short">טווח קצר</option>
                                    <option value="Medium">טווח בינוני</option>
                                    <option value="Long">טווח ארוך</option>
                                </select>
                            </div>

                            <button onClick={filterData} className="btn-primary w-full py-3 rounded-xl">
                                עדכן תוצאות
                            </button>
                        </div>

                        {/* Main List */}
                        <div className="lg:col-span-2 space-y-4">
                            <div className="flex justify-between items-center mb-2 px-2">
                                <span className="text-xs opacity-40 uppercase font-bold">מניות מומלצות ({filtered.length})</span>
                                <i data-lucide="layout-grid" className="w-4 h-4 opacity-20"></i>
                            </div>

                            {filtered.length > 0 ? filtered.map(stock => (
                                <div key={stock.ticker} className="glass p-5 rounded-2xl flex justify-between items-center hover:bg-white/5 transition-colors">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-emerald-500/10 rounded-lg flex items-center justify-center text-emerald-500 font-bold">
                                            {stock.ticker[0]}
                                        </div>
                                        <div>
                                            <div className="font-bold text-lg">{stock.ticker}</div>
                                            <div className="text-[10px] opacity-40 uppercase">{stock.name}</div>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <div className="font-bold">${stock.price}</div>
                                        <div className="text-[10px] text-emerald-500">+{stock.return}% תשואה</div>
                                    </div>
                                    <div className={`px-3 py-1 rounded-full text-[10px] font-bold ${stock.risk === 'High' ? 'bg-red-500/10 text-red-400' : 'bg-emerald-500/10 text-emerald-500'}`}>
                                        {stock.risk}
                                    </div>
                                </div>
                            )) : (
                                <div className="text-center py-20 opacity-30">לא נמצאו מניות תואמות</div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // Render with error catching
        try {
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        } catch (err) {
            document.getElementById('root').innerHTML = `<div style="color: red; padding: 20px;">שגיאה בטעינת האפליקציה: ${err.message}</div>`;
        }
    </script>
</body>
</html>
